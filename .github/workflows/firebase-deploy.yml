name: Deploy to Firebase

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Setup Node (comes pre-installed on ubuntu-latest, but good to be explicit)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 2. Run the script to find any new photos someone uploaded via GitHub
      - name: Update Photo Gallery JSON
        run: node scan_photos.js

      # 3. Save the updated gallery.json back to GitHub so it doesn't get lost
      - name: Commit gallery.json changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "📸 Auto-update: Regenerate photo gallery list"
          file_pattern: 'gallery.json'

      # 4. Deploy the live site
      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: firebase deploy --only hosting --token "$FIREBASE_TOKEN"
